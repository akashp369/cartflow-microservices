spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          enabled: true
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**

            - id: auth-service-admin
              uri: http://localhost:8081
              predicates:
                - Path=/api/admin/**

            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/users/**

